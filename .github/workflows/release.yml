name: Release installers

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
            sidecar_ext: ""
          - os: macos-13
            target: x86_64-apple-darwin
            sidecar_ext: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            sidecar_ext: ".exe"

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('src-tauri/Cargo.toml') }}

      - name: Install backend deps + PyInstaller
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pyinstaller==6.11.*

      - name: Build backend sidecar
        run: pyinstaller backend/pyinstaller.spec --clean --noconfirm

      - name: Stage sidecar for Tauri
        shell: bash
        run: |
          mkdir -p src-tauri/binaries
          src="dist/vessel-ops-backend${{ matrix.sidecar_ext }}"
          dst="src-tauri/binaries/vessel-ops-backend-${{ matrix.target }}${{ matrix.sidecar_ext }}"
          cp "$src" "$dst"
          chmod +x "$dst" || true

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci || npm install

      - name: Build Tauri app
        working-directory: frontend
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npm run tauri:build -- --target ${{ matrix.target }}

      - name: Stage portable Windows exe
        if: runner.os == 'Windows'
        shell: bash
        run: |
          mkdir -p portable
          version=$(node -p "require('./src-tauri/tauri.conf.json').version")
          cp "src-tauri/target/${{ matrix.target }}/release/vessel-ops-ai.exe" \
             "portable/Vessel-Ops-AI_${version}_x64_portable.exe"

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: vessel-ops-ai-${{ matrix.target }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app.tar.gz
            src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe
            portable/*.exe
          if-no-files-found: ignore

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all installers
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          draft: true
          generate_release_notes: true
